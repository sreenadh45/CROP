version: '3.8'

services:
  mysql-master:
    image: mysql:8.0
    container_name: crop-mysql-master
    command: 
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --sync-binlog=1
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-buffer-pool-size=4G
      - --max-connections=1000
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: crop_marketplace_prod
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backup/mysql:/backup
    ports:
      - "3306:3306"
    networks:
      - crop-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  mysql-slave:
    image: mysql:8.0
    container_name: crop-mysql-slave
    command:
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --read-only=1
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-slave-data:/var/lib/mysql
    networks:
      - crop-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 8G

  redis:
    image: redis:7-alpine
    container_name: crop-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - crop-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: crop-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - crop-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crop-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env.production
    volumes:
      - backend-logs:/app/logs
      - backend-temp:/app/temp
      - backend-backup:/app/backup
    ports:
      - "8080:8080"
    depends_on:
      - mysql-master
      - redis
      - rabbitmq
    networks:
      - crop-network
    restart: unless-stopped
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  nginx:
    image: nginx:alpine
    container_name: crop-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - crop-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    container_name: crop-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - crop-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: crop-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - crop-network
    restart: unless-stopped

  backup:
    image: alpine:latest
    container_name: crop-backup
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - mysql-master-data:/var/lib/mysql:ro
      - backend-backup:/backup
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY}
      - BACKUP_BUCKET=${BACKUP_BUCKET}
    command: sh -c "apk add --no-cache mysql-client aws-cli && while true; do sleep 86400; /backup.sh; done"
    networks:
      - crop-network
    restart: unless-stopped

networks:
  crop-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-master-data:
    driver: local
  mysql-slave-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  backend-logs:
    driver: local
  backend-temp:
    driver: local
  backend-backup:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
