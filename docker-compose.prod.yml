version: '3.8'

services:
  # Load Balancer
  lb:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx-lb.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - crop-network
    deploy:
      mode: global
      placement:
        constraints: [node.role == manager]

  # Backend API (Scalable)
  backend:
    image: crop-marketplace/backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport
    env_file:
      - .env.production
    volumes:
      - backend-logs:/app/logs
      - backend-temp:/app/temp
    depends_on:
      - mysql-master
      - redis
      - rabbitmq
    networks:
      - crop-network
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Frontend (Scalable)
  frontend:
    image: crop-marketplace/frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=https://api.cropmarketplace.com
    networks:
      - crop-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # MySQL Master
  mysql-master:
    image: mysql:8.0
    command: 
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --sync-binlog=1
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-buffer-pool-size=4G
      - --innodb-log-file-size=1G
      - --max-connections=500
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --ssl-ca=/etc/mysql/ssl/ca.pem
      - --ssl-cert=/etc/mysql/ssl/server-cert.pem
      - --ssl-key=/etc/mysql/ssl/server-key.pem
      - --require-secure-transport=ON
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql/master.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./ssl/mysql:/etc/mysql/ssl:ro
      - ./backup/mysql:/backup
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: crop_marketplace_prod
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    networks:
      - crop-network
    deploy:
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # MySQL Replica
  mysql-replica:
    image: mysql:8.0
    command:
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --read-only=1
      - --log-slave-updates=0
      - --innodb-buffer-pool-size=4G
    volumes:
      - mysql-replica-data:/var/lib/mysql
      - ./mysql/replica.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./ssl/mysql:/etc/mysql/ssl:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - crop-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Redis Cluster
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf
    volumes:
      - redis-data:/data
    networks:
      - crop-network
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit disk_free_limit 2GB
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - crop-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # Elasticsearch for logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    environment:
      - node.name=elasticsearch
      - cluster.name=crop-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - crop-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - XPACK_MONITORING_ENABLED=false
    ports:
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - crop-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana.cropmarketplace.com
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - crop-network
    deploy:
      placement:
        constraints: [node.role == manager]

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - crop-network
    deploy:
      placement:
        constraints: [node.role == manager]

  # Grafana
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=https://monitoring.cropmarketplace.com
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - crop-network
    deploy:
      placement:
        constraints: [node.role == manager]

  # Backup Service
  backup:
    image: crop-marketplace/backup:${TAG:-latest}
    build:
      context: ./scripts
      dockerfile: Dockerfile.backup
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS}
      - MYSQL_HOST=mysql-master
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - backup-data:/backup
    networks:
      - crop-network
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  crop-network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.0.0/16

volumes:
  mysql-master-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=storage.cropmarketplace.com,rw,nfsvers=4
      device: :/exports/mysql-master
  mysql-replica-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  elasticsearch-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  backend-logs:
    driver: local
  backend-temp:
    driver: local
  backup-data:
    driver: local
